name: Publish English Podcast

on:
  repository_dispatch:
    types: [publish_podcast_10am]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
      UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
      FORCE_DRY_RUN: "false"
      PODCAST_SLOT: "10:00"
      PODCAST_TIMEZONE: "America/Toronto"
      PODCAST_VALID_WINDOW_HOURS: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run podcast publishing workflow
        run: python src/run_workflow.py
