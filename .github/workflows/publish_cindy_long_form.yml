name: Publish Cindy Long Form

on:
  repository_dispatch:
    types: [publish_cindy_10am]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
      AIRTABLE_TABLE_NAME_CINDY: Cindy Long Form
      UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
      FORCE_DRY_RUN: "false"
      CINDY_SLOT: "10"
      CINDY_TIMEZONE: "America/Toronto"
      CINDY_VOICE: "bf_emma"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cindy long-form publishing workflow
        run: python src/publish_cindy_now.py
